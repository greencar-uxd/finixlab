name: Deploy to GitHub Pages

# main 브랜치에 머지되면 자동으로 GitHub Pages에 배포합니다.
# 첫 실행 시 Pages를 자동으로 활성화하므로(enablement: true) 별도 설정이 필요 없습니다.
# 배포 후 주소: https://greencar-uxd.github.io/finixlab/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # uploads/ 는 어떤 페이지에서도 참조되지 않는 원본 소스 사진(≈230MB)이라
      # 배포에서 제외합니다. 아티팩트가 커지면 Pages 동기화(syncing_files)가
      # "Deployment failed, try again later"로 실패하는 빈도가 높아집니다.
      - name: Stage site (exclude raw uploads)
        run: |
          mkdir -p "$RUNNER_TEMP/site"
          rsync -a --exclude='.git' --exclude='.github' --exclude='uploads' ./ "$RUNNER_TEMP/site/"
          du -sh "$RUNNER_TEMP/site"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
