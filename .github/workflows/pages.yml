name: Deploy to GitHub Pages

# main 브랜치에 머지되면 자동으로 GitHub Pages에 배포합니다.
# 첫 실행 시 Pages를 자동으로 활성화하므로(enablement: true) 별도 설정이 필요 없습니다.
# 배포 후 주소: https://greencar-uxd.github.io/finixlab/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
