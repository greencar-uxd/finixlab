  <script type="text/babel">
    // ---- Tiny hash-based router ----
    function useMobile() {
      const [m, setM] = React.useState(() => window.innerWidth <= 640);
      React.useEffect(() => {
        const on = () => setM(window.innerWidth <= 640);
        window.addEventListener('resize', on);
        return () => window.removeEventListener('resize', on);
      }, []);
      return m;
    }
    const desktopRoutes = {
      ''                 : () => <HomeV1 />,
      'home'             : () => <HomeV1 />,
      'shop'             : () => <ShopPage />,
      'shop/peptosome'   : () => <ProductPage />,
      'science'          : () => <SciencePage />,
      'journal'          : () => <JournalPage />,
      'about'            : () => <AboutPage />,
      'cart'             : () => <CartPage />,
      'cart/empty'       : () => <EmptyCartPage />,
      'account'          : () => <AccountPage />,
      'search'           : () => <SearchPage />,
      '404'              : () => <NotFoundPage />,
    };
    const mobileRoutes = {
      ''                 : () => <HomeMobile />,
      'home'             : () => <HomeMobile />,
      'shop'             : () => <ShopMobile />,
      'shop/peptosome'   : () => <ProductMobile />,
      'science'          : () => <ScienceMobile />,
      'journal'          : () => <JournalMobile />,
      'about'            : () => <AboutMobile />,
      'cart'             : () => <CartMobile />,
      'account'          : () => <AccountMobile />,
      'search'           : () => <SearchMobile />,
      '404'              : () => <NotFoundMobile />,
    };

    function useHashRoute(){
      const [hash, setHash] = React.useState(() => location.hash.replace(/^#\/?/, ''));
      React.useEffect(() => {
        const on = () => {
          setHash(location.hash.replace(/^#\/?/, ''));
          window.scrollTo(0, 0);
        };
        window.addEventListener('hashchange', on);
        return () => window.removeEventListener('hashchange', on);
      }, []);
      return hash;
    }

    // Intercept clicks on links so the prototype navigates with hash routes
    // even though the existing pages use href="#" everywhere.
    function useNavInterception(){
      React.useEffect(() => {
        const onClick = (e) => {
          let el = e.target;
          while (el && el !== document.body) {
            if (el.dataset && el.dataset.go) {
              e.preventDefault();
              location.hash = '#/' + el.dataset.go;
              return;
            }
            if (el.tagName === 'A') {
              const href = el.getAttribute('href') || '';
              if (href.startsWith('#/')) return;   // already valid hash route
              const txt = (el.textContent || '').trim().toLowerCase();
              const map = {
                'shop': 'shop',
                'science': 'science',
                'journal': 'journal',
                'about': 'about',
                'home': 'home',
                'search': 'search',
                'account': 'account',
                'bag': 'cart',
                'cart': 'cart',
                'bag · 2': 'cart',
              };
              for (const k of Object.keys(map)) {
                if (txt === k || txt.startsWith(k + ' ') || txt.includes('peptosome')) {
                  e.preventDefault();
                  if (txt.includes('peptosome')) location.hash = '#/shop/peptosome';
                  else location.hash = '#/' + map[k];
                  return;
                }
              }
              if (href === '#') e.preventDefault();
              return;
            }
            el = el.parentElement;
          }
        };
        document.addEventListener('click', onClick);
        return () => document.removeEventListener('click', onClick);
      }, []);
    }

    const App = () => {
      const hash = useHashRoute();
      useNavInterception();
      const isMobile = useMobile();
      const routes = isMobile ? mobileRoutes : desktopRoutes;
      const Page = routes[hash] || (isMobile ? mobileRoutes['404'] : desktopRoutes['404']);
      return <Page />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
